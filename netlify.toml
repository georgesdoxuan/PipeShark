[build]
  command = "npm run build"
  publish = ".next"

# Required: plugin runs Next.js runtime so routes and assets (CSS/JS) work. Without it you get 404 or unstyled pages.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled functions (cron)
[functions]
  node_bundler = "esbuild"

[functions.cron-launch]
  schedule = "*/15 * * * *"

[functions.cron-process-queue]
  schedule = "* * * * *"
