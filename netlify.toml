[build]
  command = "npm run build"

# Do NOT set publish when using @netlify/plugin-nextjs — the plugin deploys Next.js correctly (CSS, JS, serverless).
# Setting publish = ".next" was serving raw build output and broke CSS/JS loading.

# Scheduled function: calls /api/cron/launch-scheduled-campaigns every 15 minutes (UTC)
[functions]
  node_bundler = "esbuild"

[functions.cron-launch]
  schedule = "*/15 * * * *"

[functions.cron-process-queue]
  schedule = "* * * * *"

[[plugins]]
  package = "@netlify/plugin-nextjs"
