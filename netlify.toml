# Build: défini dans l’UI Netlify (Build command: npx next build --webpack, Publish: .next)
# pour éviter les conflits avec le plugin. Voir https://www.reddit.com/r/nextjs/comments/1479v97/

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled functions (cron)
[functions]
  node_bundler = "esbuild"

# Email queue: run on Scaleway every minute (see scripts/cron-process-queue-scaleway.sh)
# [functions.cron-process-queue]
#   schedule = "* * * * *"

# GDPR purge: strip PII from non-replied leads older than 30 days (daily at 03:00 UTC)
[functions.cron-purge-leads]
  schedule = "0 3 * * *"
